; ── Performance ──────────────────────────────────────────────────────────────
memory_limit = 256M
max_execution_time = 60
post_max_size = 10M
upload_max_filesize = 10M

; ── Timezone ─────────────────────────────────────────────────────────────────
date.timezone = UTC

; ── Error reporting (production safe) ────────────────────────────────────────
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log

; ── Sessions ─────────────────────────────────────────────────────────────────
session.gc_maxlifetime = 7200

; ── Security ─────────────────────────────────────────────────────────────────
expose_php = Off
